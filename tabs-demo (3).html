  .phone{
    width:380px;
    background:var(--card);
    border-radius:28px;
    box-shadow:0 20px 60px rgba(20,30,50,.15);
    overflow:hidden;
    border:1px solid var(--line);
  }
  .header{
    padding:18px 20px 14px;
    border-bottom:1px solid var(--line);
  }
  .header h1{
    margin:0;
    font-size:17px;
    font-weight:700;
    color:var(--ink);
  }
  .header p{
    margin:4px 0 0;
    font-size:12px;
    color:var(--sub);
  }

  /* Tabs */
  .tabbar{
    display:flex;
    padding:14px 20px 0;
    gap:8px;
  }
  .tab{
    flex:1;
    text-align:center;
    padding:10px 0;
    font-size:14px;
    font-weight:600;
    color:var(--sub);
    background:#eef1f4;
    border-radius:10px 10px 0 0;
    cursor:pointer;
    transition:all .18s ease;
    user-select:none;
  }
  .tab.active{
    background:var(--green);
    color:#fff;
  }
  .tab:not(.active):hover{
    background:#e2e6eb;
  }

  .panel{
    padding:20px;
    min-height:220px;
  }
  .panel[hidden]{display:none;}

  .grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:14px 8px;
  }
  .item{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    cursor:pointer;
  }
  .icon{
    width:46px;
    height:46px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    background:#f0f2f5;
    border:1px solid var(--line);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .item:hover .icon{
    transform:translateY(-2px);
    box-shadow:0 6px 14px rgba(20,30,50,.08);
  }
  .label{
    font-size:11.5px;
    color:var(--ink);
    text-align:center;
  }

  /* icon accent colors */
  .icon.green{color:var(--green);}
  .icon.blue{color:#2f7bf0;}
  .icon.orange{color:#f0a72f;}
  .icon.red{color:#ef4444;}
  .icon.teal{color:#0d9488;}
  .icon.pink{color:#db2777;}

  a.item{text-decoration:none;}
  .item[title]{cursor:default;}
  .item[title] .icon{opacity:.55;}
  .icon.photo{
    background:#fff;
    padding:6px;
  }
  .icon.bubble{
    background:#f0fdf4;
  }
  .icon.purple{color:#8b5cf6;}

  .admin-card{
    background:#f9fafb;
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px;
    margin-bottom:12px;
  }
  .admin-card .row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:6px;
  }
  .admin-card .row:last-child{margin-bottom:0;}
  .admin-card .k{font-size:12.5px;color:var(--sub);}
  .admin-card .v{font-size:14px;font-weight:700;color:var(--ink);}
  .admin-card .v.big{font-size:20px;color:var(--green-dark);}

  .empty-state{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:180px;
    color:var(--sub);
    text-align:center;
    gap:10px;
  }
  .empty-icon{
    font-size:32px;
    opacity:.6;
  }
  .empty-state p{
    margin:0;
    font-size:13px;
    max-width:220px;
  }

  .footnote{
    padding:12px 20px 20px;
    font-size:11px;
    color:#b7bcc4;
    text-align:center;
  }
</style>
</head>

  document.querySelectorAll('.tab').forEach(t=>{

  });

  document.getElementById('panel-admin').hidden = name !== 'admin';
}
